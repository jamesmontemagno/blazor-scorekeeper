    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="My Score Keeper" />
    <link rel="stylesheet" href="_content/MyScoreBoardShared/lib/bootstrap/dist/css/bootstrap.min.css" />
    <!-- Apply persisted theme immediately to prevent flash -->
    <script>(function(){var t=localStorage.getItem('appTheme')||'system';if(['system','light','dark'].indexOf(t)<0)t='system';document.documentElement.setAttribute('data-theme',t);})();</script>
    <link rel="stylesheet" href="css/app.css" />
    <!-- shared styles from MyScoreBoardShared -->
    <link rel="stylesheet" href="_content/MyScoreBoardShared/css/app.css" />

    <link href="MyScoreBoard.styles.css" rel="stylesheet" />
</head>

<body>
    <div id="app">
        <svg class="loading-progress">
            <circle r="40%" cx="50%" cy="50%" />
            <circle r="40%" cx="50%" cy="50%" />
        </svg>
        <div class="loading-progress-text"></div>
    </div>

    <div id="blazor-error-ui">
        An unhandled error has occurred.
        <a href="." class="reload">Reload</a>
        <span class="dismiss">🗙</span>
    </div>
    <!-- Bootstrap JS (required for navbar collapse/toggler) -->
    <script src="_content/MyScoreBoardShared/lib/bootstrap/dist/js/bootstrap.bundle.min.js"></script>
    <script type="module" src="./js/indexedDb.js"></script>
    <script src="_content/MyScoreBoardShared/js/theme.js"></script>
    <script src="_content/MyScoreBoardShared/js/confetti.js"></script>
    <script src="_framework/blazor.webassembly.js" autostart="false"></script>
    <script>
        // Register service worker for PWA
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('service-worker.js');
            });
        }
        // Start Blazor after SW registration to ensure offline assets are cached on first run
        window.Blazor.start();
    </script>
</body>

</html>
