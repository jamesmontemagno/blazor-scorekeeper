name: "Copilot Setup Steps"

# Allow testing of the setup steps from the repository's "Actions" tab,
# and automatically validate whenever this file changes.
on:
  workflow_dispatch:
  push:
    paths:
      - .github/workflows/copilot-setup-steps.yml
  pull_request:
    paths:
      - .github/workflows/copilot-setup-steps.yml

jobs:
  # The job MUST be called `copilot-setup-steps` or it will not be picked up by Copilot.
  copilot-setup-steps:
    runs-on: ubuntu-latest

    # Set the permissions to the lowest permissions possible needed for your steps.
    # Copilot will be given its own token for its operations.
    permissions:
      # If you want to clone the repository as part of your setup steps, for example to install dependencies, you'll need the `contents: read` permission. If you don't clone the repository in your setup steps, Copilot will do this for you automatically after the steps complete.
      contents: read

    # You can define any steps you want, and they will run before the agent starts.
    # If you do not check out your code, Copilot will do this for you.
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Install MAUI Android workload
        run: dotnet workload install maui-android

      # Restore the Blazor web app and the MAUI Android app separately.
      # MyScoreBoardShared has two .csproj files that target different frameworks
      # (net9.0 for Blazor, net10.0 for MAUI) but share the same obj/ directory.
      # Restoring via the solution file causes the project.assets.json to be
      # overwritten by whichever project is restored last, breaking the other
      # framework's build. Restoring each host project individually avoids this.
      - name: Restore Blazor web app
        run: dotnet restore MyScoreBoard/MyScoreBoard.csproj

      - name: Restore MAUI Android app
        run: dotnet restore MyScoreBoardMaui/MyScoreBoardMaui.csproj

      - name: Pre-build MAUI Android target
        run: dotnet build MyScoreBoardMaui/MyScoreBoardMaui.csproj -f net10.0-android --no-restore
